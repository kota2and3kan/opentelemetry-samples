mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

    prometheus/cockroachdb:
      config:
        scrape_configs:
          - job_name: cockroachdb
            scrape_interval: 15s
            metrics_path: /_status/vars
            tls_config:
              insecure_skip_verify: true
            static_configs:
              # Assumes 3 replicas. Update targets if the replica count changes.
              - targets:
                  - "cockroachdb-0.cockroachdb.crdb.svc.cluster.local:8080"
                  - "cockroachdb-1.cockroachdb.crdb.svc.cluster.local:8080"
                  - "cockroachdb-2.cockroachdb.crdb.svc.cluster.local:8080"

  exporters:
    otlphttp/mimir:
      endpoint: http://mimir.lgtm.svc.cluster.local:9009/otlp
    otlphttp/loki:
      endpoint: http://loki.lgtm.svc.cluster.local:3100/otlp
    otlp/tempo:
      endpoint: tempo.lgtm.svc.cluster.local:4317
      tls:
        insecure: true

  processors:
    batch: {}
    attributes/cockroachdb:
      actions:
        - key: cluster
          value: "cockroachdb"
          action: upsert

  service:
    pipelines:
      metrics:
        receivers: [prometheus/cockroachdb]
        processors: [attributes/cockroachdb, batch]
        exporters: [otlphttp/mimir]
      logs:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlphttp/loki]
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlp/tempo]
